<g class="f1"><line x1="88" y1="120" x2="86.4" y2="74"/><circle cx="85.9" cy="61" r="7"/><line x1="86.4" y1="74" x2="97.9" y2="82.1"/><line x1="97.9" y1="82.1" x2="88" y2="72.2"/><line x1="88" y1="120" x2="123.6" y2="125"/><line x1="123.6" y1="125" x2="125" y2="163"/><g class="halo"><line x1="88" y1="120" x2="123.6" y2="125"/></g><g class="acc"><line x1="88" y1="120" x2="123.6" y2="125"/></g><g class="dev"><circle cx="125" cy="163" r="5"/></g></g><g class="f2"><line x1="88" y1="120" x2="86.4" y2="74"/><circle cx="85.9" cy="61" r="7"/><line x1="86.4" y1="74" x2="97.9" y2="82.1"/><line x1="97.9" y1="82.1" x2="88" y2="72.2"/><line x1="88" y1="120" x2="123.6" y2="125"/><line x1="123.6" y1="125" x2="163" y2="132"/><g class="halo"><line x1="88" y1="120" x2="123.6" y2="125"/></g><g class="acc"><line x1="88" y1="120" x2="123.6" y2="125"/></g><g class="dev"><circle cx="163" cy="132" r="5"/></g></g>
