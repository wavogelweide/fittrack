<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
<style>
svg{color:#a3e635}
line,path,circle{stroke:#dde3ec;stroke-width:5;stroke-linecap:round;fill:none}
.far line,.far path{stroke:#7d8595}
.dev line,.dev path,.dev circle{stroke:#5c6678;stroke-width:4}
.dev .fill{fill:#39414f;stroke:none}
.halo line{stroke:currentColor;stroke-width:14;opacity:0.22}
.acc line{stroke:currentColor;stroke-width:6}
.arr{stroke:currentColor;stroke-width:3.5;opacity:0.9}
.f1{animation:fa 1.9s ease-in-out infinite}.f2{opacity:0;animation:fb 1.9s ease-in-out infinite}
@keyframes fa{0%,42%{opacity:1}52%,90%{opacity:0}100%{opacity:1}}
@keyframes fb{0%,42%{opacity:0}52%,90%{opacity:1}100%{opacity:0}}
@media (prefers-reduced-motion:reduce){.f1,.f2{animation:none}}</style>
<defs><marker id="ah" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M1 1 L10 6 L1 11 Z" style="fill:#a3e635;stroke:none"/></marker></defs>
<g class="dev"><rect class="fill" x="82" y="158" width="46" height="10" rx="2"/><line x1="30" y1="170" x2="170" y2="170" opacity="0.45"/></g>
<g class="f1"><line x1="100" y1="108" x2="100" y2="62"/><circle cx="100" cy="49" r="7"/><line x1="100" y1="62" x2="104.2" y2="85.6"/><line x1="104.2" y1="85.6" x2="105.9" y2="105.6"/><line x1="100" y1="108" x2="102.1" y2="137.9"/><line x1="102.1" y1="137.9" x2="102.1" y2="159.9"/><line x1="102.1" y1="159.9" x2="116.1" y2="159.9"/><g class="halo"><line x1="102.1" y1="137.9" x2="102.1" y2="159.9"/></g><g class="acc"><line x1="102.1" y1="137.9" x2="102.1" y2="159.9"/></g></g><g class="f2"><line x1="100" y1="100" x2="100" y2="54"/><circle cx="100" cy="41" r="7"/><line x1="100" y1="54" x2="104.2" y2="77.6"/><line x1="104.2" y1="77.6" x2="105.9" y2="97.6"/><line x1="100" y1="100" x2="102.1" y2="129.9"/><line x1="102.1" y1="129.9" x2="102.1" y2="153.9"/><line x1="102.1" y1="153.9" x2="114.2" y2="146.9"/><g class="halo"><line x1="102.1" y1="129.9" x2="102.1" y2="153.9"/></g><g class="acc"><line x1="102.1" y1="129.9" x2="102.1" y2="153.9"/></g></g>
</svg>