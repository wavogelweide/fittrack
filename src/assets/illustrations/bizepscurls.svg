<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
<style>
svg{color:#a3e635}
line,path,circle{stroke:#dde3ec;stroke-width:5;stroke-linecap:round;fill:none}
.far line,.far path{stroke:#7d8595}
.dev line,.dev path,.dev circle{stroke:#5c6678;stroke-width:4}
.dev .fill{fill:#39414f;stroke:none}
.halo line{stroke:currentColor;stroke-width:14;opacity:0.22}
.acc line{stroke:currentColor;stroke-width:6}
.arr{stroke:currentColor;stroke-width:3.5;opacity:0.9}
.f1{animation:fa 1.9s ease-in-out infinite}.f2{opacity:0;animation:fb 1.9s ease-in-out infinite}
@keyframes fa{0%,42%{opacity:1}52%,90%{opacity:0}100%{opacity:1}}
@keyframes fb{0%,42%{opacity:0}52%,90%{opacity:1}100%{opacity:0}}
@media (prefers-reduced-motion:reduce){.f1,.f2{animation:none}}</style>
<defs><marker id="ah" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M1 1 L10 6 L1 11 Z" style="fill:#a3e635;stroke:none"/></marker></defs>
<g class="dev"><line x1="68" y1="128" x2="108" y2="128"/><line x1="88" y1="128" x2="88" y2="166"/><line x1="74" y1="166" x2="102" y2="166"/><line x1="94" y1="96" x2="124" y2="106"/></g>
<g class="f1"><line x1="88" y1="120" x2="86.4" y2="74"/><circle cx="85.9" cy="61" r="7"/><line x1="86.4" y1="74" x2="104.4" y2="86.6"/><line x1="104.4" y1="86.6" x2="125.2" y2="98.6"/><line x1="88" y1="120" x2="123.8" y2="123.8"/><line x1="123.8" y1="123.8" x2="126.5" y2="161.7"/><g class="halo"><line x1="86.4" y1="74" x2="104.4" y2="86.6"/></g><g class="acc"><line x1="86.4" y1="74" x2="104.4" y2="86.6"/></g></g><g class="f2"><line x1="88" y1="120" x2="86.4" y2="74"/><circle cx="85.9" cy="61" r="7"/><line x1="86.4" y1="74" x2="104.4" y2="86.6"/><line x1="104.4" y1="86.6" x2="110.1" y2="65.4"/><line x1="88" y1="120" x2="123.8" y2="123.8"/><line x1="123.8" y1="123.8" x2="126.5" y2="161.7"/><g class="halo"><line x1="86.4" y1="74" x2="104.4" y2="86.6"/></g><g class="acc"><line x1="86.4" y1="74" x2="104.4" y2="86.6"/></g></g>
</svg>